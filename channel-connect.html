<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>채널 API 연동 | Omnify test0719</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root{--ink:#172033;--muted:#657087;--line:#dfe5ef;--bg:#f4f7fb;--card:#fff;--blue:#3563e9;--green:#13875d;--red:#c43d4b;--amber:#b36b00}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.55 Pretendard,system-ui,sans-serif}
    button,input,select{font:inherit}.wrap{max-width:1180px;margin:auto;padding:28px 20px 70px}
    header{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:20px}
    h1{margin:2px 0 4px;font-size:26px}.eyebrow{font-size:12px;font-weight:800;color:var(--blue);letter-spacing:.08em}
    .sub{color:var(--muted);margin:0}.auth{width:min(440px,100%);background:#eef3ff;border:1px solid #cfdbff;border-radius:12px;padding:12px}
    .auth label,.field label{display:block;font-size:12px;font-weight:750;margin-bottom:5px}.auth-row{display:flex;gap:7px}
    input,select{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 10px;background:#fff;color:var(--ink)}
    input:focus,select:focus{outline:2px solid #b9cbff;border-color:var(--blue)}.btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 11px;font-weight:750;cursor:pointer}
    .btn:hover{border-color:#aebad0}.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}.btn.danger{color:var(--red)}
    .notice{border:1px solid #f0d59b;background:#fff8e8;color:#7a4a00;border-radius:12px;padding:12px 14px;margin-bottom:18px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:17px;box-shadow:0 4px 18px rgba(36,53,86,.04)}
    .card-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:13px}.title{font-size:17px;font-weight:850}.badge{font-size:11px;font-weight:800;border-radius:999px;padding:4px 8px;background:#eef1f6;color:var(--muted)}
    .badge.connected{background:#e8f8f1;color:var(--green)}.badge.error{background:#fff0f1;color:var(--red)}.badge.saved{background:#fff6df;color:var(--amber)}
    .desc{font-size:12px;color:var(--muted);margin:-7px 0 13px}.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field.full{grid-column:1/-1}
    .actions{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px;padding-top:13px;border-top:1px solid var(--line)}.meta{font-size:12px;color:var(--muted);margin-top:10px;min-height:20px}
    .result{position:fixed;right:20px;bottom:20px;max-width:440px;padding:12px 15px;border-radius:10px;background:#172033;color:#fff;box-shadow:0 12px 30px rgba(0,0,0,.2);display:none;white-space:pre-wrap}
    .result.show{display:block}.result.error{background:#9f2634}.loading{opacity:.58;pointer-events:none}
    @media(max-width:820px){header{display:block}.auth{margin-top:16px}.grid{grid-template-columns:1fr}}@media(max-width:520px){.fields{grid-template-columns:1fr}.field.full{grid-column:auto}.wrap{padding:20px 12px 60px}}
  </style>
</head>
<body>
<main class="wrap">
  <header>
    <div>
      <div class="eyebrow">OMNIFY CONNECTION CENTER</div>
      <h1>채널 API 연동</h1>
      <p class="sub">테스트 대시보드 <strong id="tenant-label">test0719</strong> · 자격증명은 서버에서 AES-256-GCM으로 암호화됩니다.</p>
      <p><a class="btn" id="dashboard-link" href="demo-dashboard.html?tenant=test0719&tier=enterprise">실데이터 대시보드 열기 →</a></p>
    </div>
    <div class="auth">
      <label for="connect-token">연동 관리 토큰</label>
      <div class="auth-row">
        <input id="connect-token" type="password" autocomplete="off" placeholder="TEST0719_CONNECT_TOKEN 또는 고객 수집 토큰">
        <button class="btn primary" id="load-status" type="button">상태 조회</button>
      </div>
    </div>
  </header>
  <div class="notice">
    실제 연결에는 판매채널에서 발급한 권한과 허용 IP 등록이 필요합니다. 에이블리·무신사는 공개 개발자 문서가 없어 파트너 계약 후 받은 API 주소·경로를 함께 입력해야 합니다.
  </div>
  <section class="grid" id="channel-grid" aria-live="polite"></section>
</main>
<div class="result" id="result" role="status" aria-live="assertive"></div>
<script src="js/channel-connect.js?v=20260719-zzmu1"></script>
</body>
</html>
